name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["feature-request"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas. Describe what you'd like and why it would be useful.

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
      placeholder: I'd like VOQR to...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would you use this? What problem does it solve?
      placeholder: This would help me because...
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Voice input (STT / microphone)
        - Voice output (TTS / speech quality)
        - AI chat integration
        - UI / UX
        - Performance
        - Platform support
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or seen this done elsewhere?
